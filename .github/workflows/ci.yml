name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  backend-node:
    name: Backend Node.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Implementations/Backend-NodeJS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Implementations/Backend-NodeJS/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests with coverage
        run: npm run test:coverage

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: Implementations/Backend-NodeJS/coverage

  frontend:
    name: Frontend Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Implementations/Frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Implementations/Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: Implementations/Frontend/coverage

  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: [backend-node, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            Implementations/Backend-NodeJS/package-lock.json
            Implementations/Frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: Implementations/Backend-NodeJS
        run: npm ci

      - name: Generate backend coverage for SonarQube
        working-directory: Implementations/Backend-NodeJS
        run: npm run test:coverage

      - name: Install frontend dependencies
        working-directory: Implementations/Frontend
        run: npm ci

      - name: Generate frontend coverage for SonarQube
        working-directory: Implementations/Frontend
        run: npm run test:coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
