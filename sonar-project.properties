sonar.projectKey=JITNONGNOOONGWeb
sonar.projectName=JITNONGNOOONGWeb

# Application source code
sonar.sources=Implementations/Backend-NodeJS/src,Implementations/Frontend/src

# Test locations
sonar.tests=Implementations/Frontend/src,Implementations/Backend-NodeJS/test
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.test.js

# General exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.min.js,**/package-lock.json

# Test files should not count toward coverage
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.test.js,**/test-setup.ts

# JavaScript/TypeScript coverage reports
sonar.javascript.lcov.reportPaths=Implementations/Frontend/coverage/lcov.info,Implementations/Backend-NodeJS/coverage/lcov.info
