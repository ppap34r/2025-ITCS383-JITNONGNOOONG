sonar.projectKey=jitnongnooong-1st-website
sonar.organization=thanyakarn-panyadee
sonar.projectName=jitnongnooong-1st-website
sonar.sourceEncoding=UTF-8

# Application source code
sonar.sources=Implementations/Backend-NodeJS/src,Implementations/Frontend/src

# Test locations
sonar.tests=Implementations/Frontend/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# General exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.min.js,**/package-lock.json

# Test files should not count toward coverage
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/test-setup.ts

# JavaScript/TypeScript coverage report generated by Vitest
sonar.javascript.lcov.reportPaths=Implementations/Frontend/coverage/lcov.info
