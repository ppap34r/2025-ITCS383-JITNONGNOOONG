sonar.projectKey=MharRuengSang
sonar.projectName=MharRuengSang

# Source roots
sonar.sources=Implementations/Frontend/src,Implementations/Backend/restaurant-service/src/main/java,Implementations/Backend/order-service/src/main/java,Implementations/Backend/api-gateway/src/main/java,Implementations/Backend/common/src/main/java

# Test roots
sonar.tests=Implementations/Backend/restaurant-service/src/test/java,Implementations/Backend/order-service/src/test/java

# Language hints
sonar.java.binaries=Implementations/Backend/restaurant-service/target/classes,Implementations/Backend/order-service/target/classes,Implementations/Backend/api-gateway/target/classes,Implementations/Backend/common/target/classes

# Exclusions
sonar.exclusions=**/node_modules/**,**/target/**,**/*.min.js,**/dist/**

# Coverage exclusions - test files should not be measured for coverage
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/test-setup.ts

# Coverage reports (JaCoCo XML)
sonar.coverage.jacoco.xmlReportPaths=Implementations/Backend/restaurant-service/target/site/jacoco/jacoco.xml,Implementations/Backend/order-service/target/site/jacoco/jacoco.xml

# Frontend coverage (LCOV from vitest)
sonar.javascript.lcov.reportPaths=Implementations/Frontend/coverage/lcov.info
