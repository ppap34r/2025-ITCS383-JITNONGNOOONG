version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14
    container_name: mhar-postgres
    environment:
      POSTGRES_DB: mhar_main
      POSTGRES_USER: mhar_user
      POSTGRES_PASSWORD: mhar_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    networks:
      - mhar-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mhar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mhar-network

  # Service Discovery (Eureka Server)
  eureka-server:
    build:
      context: ./mhar-eureka-server
      dockerfile: Dockerfile
    container_name: mhar-eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - mhar-network

  # API Gateway
  api-gateway:
    build:
      context: ./mhar-api-gateway
      dockerfile: Dockerfile
    container_name: mhar-api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_REDIS_HOST=redis
    depends_on:
      - eureka-server
      - redis
    networks:
      - mhar-network

  # Order Service (Your responsibility)
  order-service:
    build:
      context: ./mhar-order-service
      dockerfile: Dockerfile
    container_name: mhar-order-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/mhar_orders
      - SPRING_DATASOURCE_USERNAME=mhar_user
      - SPRING_DATASOURCE_PASSWORD=mhar_password
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_REDIS_HOST=redis
    depends_on:
      - postgres
      - eureka-server
      - redis
    networks:
      - mhar-network

  # Restaurant Service (Your responsibility)
  restaurant-service:
    build:
      context: ./mhar-restaurant-service
      dockerfile: Dockerfile
    container_name: mhar-restaurant-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/mhar_restaurants
      - SPRING_DATASOURCE_USERNAME=mhar_user
      - SPRING_DATASOURCE_PASSWORD=mhar_password
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_REDIS_HOST=redis
    depends_on:
      - postgres
      - eureka-server
      - redis
    networks:
      - mhar-network

  # Auth Service (Natkrittar's responsibility)
  auth-service:
    build:
      context: ./mhar-auth-service
      dockerfile: Dockerfile
    container_name: mhar-auth-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/mhar_auth
      - SPRING_DATASOURCE_USERNAME=mhar_user
      - SPRING_DATASOURCE_PASSWORD=mhar_password
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - postgres
      - eureka-server
    networks:
      - mhar-network

  # Payment Service (Pundharee's responsibility)
  payment-service:
    build:
      context: ./mhar-payment-service
      dockerfile: Dockerfile
    container_name: mhar-payment-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/mhar_payments
      - SPRING_DATASOURCE_USERNAME=mhar_user
      - SPRING_DATASOURCE_PASSWORD=mhar_password
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - postgres
      - eureka-server
    networks:
      - mhar-network

  # Rider Service (Pundharee's responsibility)
  rider-service:
    build:
      context: ./mhar-rider-service
      dockerfile: Dockerfile
    container_name: mhar-rider-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/mhar_riders
      - SPRING_DATASOURCE_USERNAME=mhar_user
      - SPRING_DATASOURCE_PASSWORD=mhar_password
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - postgres
      - eureka-server
    networks:
      - mhar-network

volumes:
  postgres_data:
  redis_data:

networks:
  mhar-network:
    driver: bridge
