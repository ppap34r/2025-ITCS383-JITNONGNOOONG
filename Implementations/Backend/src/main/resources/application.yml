spring:
  application:
    name: mharruengsang-backend
  
  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/mharruengsang?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 15102547 # ← Replace with your actual MySQL root password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: false
    open-in-view: false
  
  # Kafka Configuration (for async processing)
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      bootstrap-servers: localhost:9092
      group-id: mharruengsang-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.mharruengsang.*"

server:
  port: 8080
  servlet:
    context-path: /api

# CORS Configuration for frontend at localhost:5173 (Vite default)
cors:
  allowed-origins: http://localhost:5173,http://localhost:4000,http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# Payment Gateway Configuration
payment:
  stripe:
    api-key: ${STRIPE_API_KEY:sk_test_your_stripe_key}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret}
  
  omise:
    api-key: ${OMISE_API_KEY:skey_test_your_omise_key}
    
  # Default payment provider
  default-provider: stripe

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your_super_secret_jwt_key_change_in_production}
  expiration: 86400000  # 24 hours in milliseconds

# Logging
logging:
  level:
    root: INFO
    com.mharruengsang: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
