# Test configuration for Restaurant Service
spring:
  application:
    name: mhar-restaurant-service-test

  # Test Database Configuration (H2 in-memory)
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA Configuration for Tests
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  # Disable Redis for tests
  cache:
    type: none
  
  # Disable Redis data (if present)
  data:
    redis:
      repositories:
        enabled: false

# Disable service discovery for tests
eureka:
  client:
    enabled: false

# Test logging configuration
logging:
  level:
    com.itcs383.restaurant: DEBUG
    org.springframework.web: DEBUG
    sql: DEBUG

# Test server configuration
server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info
